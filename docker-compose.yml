version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: smart-leads-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - mern-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smart-leads-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/smart-leads
      - JWT_SECRET=super_secret_jwt_key_123
    depends_on:
      - mongodb
    networks:
      - mern-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: smart-leads-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mern-network

volumes:
  mongo-data:

networks:
  mern-network:
    driver: bridge
